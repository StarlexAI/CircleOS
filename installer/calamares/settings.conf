# CircleOS Installer Configuration
# Based on Calamares installer framework

modules-search: [ local ]

instances:
- id: circleos
  module: packages
  config: packages.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - bootloader-config
  - grubcfg
  - packages
  - umount
- show:
  - finished

branding: circleos

prompt-install: true
dont-chroot: false
