[Theme]
Name=CircleOS
Description=Modern circular UI theme for CircleOS
Version=1.0.0
Author=CircleOS Team

[Colors]
Primary=#2196f3
PrimaryLight=#e3f2fd
PrimaryDark=#1976d2
Accent=#ff4081
Background=#f5f5f5
Surface=#ffffff
Error=#f44336
OnPrimary=#ffffff
OnBackground=#212121
OnSurface=#424242

[Typography]
FontFamily=Roboto
FontSize=14
FontWeight=400
HeadingFontWeight=500

[Spacing]
Unit=8
Small=4
Medium=8
Large=16
ExtraLarge=24

[BorderRadius]
Small=4
Medium=8
Large=16
Circle=50%

[Shadows]
Level1=0 1px 3px rgba(0,0,0,0.12)
Level2=0 2px 6px rgba(0,0,0,0.16)
Level3=0 4px 12px rgba(0,0,0,0.20)
Level4=0 8px 24px rgba(0,0,0,0.24)

[Animation]
Duration=200
Easing=ease-out
